name: CostMarshal CI

on:
  push:
    branches:
      - v2
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: costmarshal-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-contracts:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - "3.11"
          - "3.13"
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install native tmux contract dependency
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends tmux
      - name: Install declared runtime requirements
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Install pinned Codex plugin test surface
        if: runner.os != 'Windows'
        run: npm install --global @openai/codex@0.144.1
      - name: Install pinned Codex plugin test surface on Windows
        if: runner.os == 'Windows'
        run: npm.cmd install --global @openai/codex@0.144.1
      - name: Run the complete SHA-bound local evidence suite
        run: python tests/release/run_local_test_evidence.py
      - name: Retain the machine-readable evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-test-report-${{ matrix.os }}-py${{ matrix.python }}
          path: artifacts/local-test-report.json
          if-no-files-found: error
          retention-days: 14
