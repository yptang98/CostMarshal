name: CostMarshal CI

on:
  push:
    branches:
      - v2
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: costmarshal-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-contracts:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - "3.11"
          - "3.13"
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Select Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install declared runtime requirements
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Run the complete SHA-bound local evidence suite
        run: python tests/release/run_local_test_evidence.py
      - name: Retain the machine-readable evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: local-test-report-${{ matrix.os }}-py${{ matrix.python }}
          path: artifacts/local-test-report.json
          if-no-files-found: error
          retention-days: 14
